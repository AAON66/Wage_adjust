# Production deployment -- requires external PostgreSQL (via DATABASE_URL in .env)
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.app.celery_app worker --loglevel=info --concurrency=2
    restart: always
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
  uploads_data:
